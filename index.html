<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dIvLe® Visual Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', sans-serif;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 800px; /* Widened slightly to accommodate the landscape Vogue and beach shots */
            height: 85vh; 
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            background: #050505;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.8s ease-in-out; /* Slightly lengthened transition for a more cinematic feel */
            object-fit: contain; 
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .branding {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="carousel-container">
        <img src="5468.jpg" class="carousel-slide active" alt="Locker Room Aesthetic">
        <img src="4944.png" class="carousel-slide" alt="Vogue Centerfold">
        <img src="4942.png" class="carousel-slide" alt="Beach Setup 1">
        <img src="4943.png" class="carousel-slide" alt="Beach Setup 2">
        
        <div class="branding">dIvLe&reg;</div>
    </div>

    <script>
        const slides = document.querySelectorAll('.carousel-slide');
        let currentSlide = 0;

        function nextSlide() {
            // Smooth fade out of the current asset
            slides[currentSlide].classList.remove('active');
            
            // Advance the index, loop back to the start if necessary
            currentSlide = (currentSlide + 1) % slides.length;
            
            // Bring the next asset into focus
            slides[currentSlide].classList.add('active');
        }

        // Execute the rollover every 4.5 seconds to let the images breathe
        setInterval(nextSlide, 4500);
    </script>

</body>
</html>
