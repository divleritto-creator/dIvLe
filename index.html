<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white', upPressed: false, downPressed: false };
        const computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white' }; 
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 4, velocityX: 4, velocityY: 4, color: 'white' };

        // Draw function
        function drawRect(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        function draw() {
            drawRect(0, 0, canvas.width, canvas.height, 'black'); // Clear canvas
            drawRect(player.x, player.y, player.width, player.height, player.color); // Draw player
            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color); // Draw computer
            drawCircle(ball.x, ball.y, ball.radius, ball.color); // Draw ball
            // Draw Score
            context.fillStyle = 'white';
            context.font = '30px Arial';
            context.fillText(player.score || 0, canvas.width / 4, canvas.height / 5);
            context.fillText(computer.score || 0, 3 * canvas.width / 4, canvas.height / 5);
        }

        function update() {
            // Move the player paddle
            if (player.upPressed && player.y > 0) player.y -= 8;
            if (player.downPressed && (player.y < canvas.height - player.height)) player.y += 8;

            // Computer AI control
            if (ball.y > computer.y + computer.height / 2) computer.y += 4;
            else if (ball.y < computer.y + computer.height / 2) computer.y -= 4;

            // Move the ball
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision logic
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) ball.velocityY = -ball.velocityY;

            if (ball.x - ball.radius < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.velocityX = -ball.velocityX;
            } else if (ball.x + ball.radius > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height) {
                ball.velocityX = -ball.velocityX;
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                computer.score++; 
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++; 
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners for player controls
        document.addEventListener('keydown', function(event) {
            switch (event.key) {
                case 'ArrowUp':
                    player.upPressed = true;
                    break;
                case 'ArrowDown':
                    player.downPressed = true;
                    break;
            }
        });

        document.addEventListener('keyup', function(event) {
            switch (event.key) {
                case 'ArrowUp':
                    player.upPressed = false;
                    break;
                case 'ArrowDown':
                    player.downPressed = false;
                    break;
            }
        });

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
